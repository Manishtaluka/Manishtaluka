name: Generate GitHub Stats Images

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create assets folder
        run: mkdir -p assets

      - name: Download Stats Card
        run: |
          for i in 1 2 3; do
            curl -f -s --max-time 15 \
              "https://github-readme-stats.vercel.app/api?username=Manishtaluka&show_icons=true&theme=tokyonight&hide_border=true&count_private=true" \
              -o assets/stats.svg && echo "stats OK" && break || sleep 5
          done

      - name: Download Top Languages Card
        run: |
          for i in 1 2 3; do
            curl -f -s --max-time 15 \
              "https://github-readme-stats.vercel.app/api/top-langs/?username=Manishtaluka&layout=compact&theme=tokyonight&hide_border=true&langs_count=8" \
              -o assets/top-langs.svg && echo "langs OK" && break || sleep 5
          done

      - name: Download Streak Stats
        run: |
          for i in 1 2 3; do
            curl -f -s --max-time 15 \
              "https://github-readme-streak-stats-eight.vercel.app?user=Manishtaluka&theme=tokyonight&hide_border=true" \
              -o assets/streak.svg && echo "streak OK" && break || sleep 5
          done

      - name: Download Trophies
        run: |
          for i in 1 2 3; do
            curl -f -s --max-time 15 \
              "https://github-profile-trophy.vercel.app/?username=Manishtaluka&theme=darkhub&no-frame=true&no-bg=true&margin-w=4&row=1" \
              -o assets/trophies.svg && echo "trophies OK" && break || sleep 5
          done

      - name: Commit and push assets
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update stats images [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
