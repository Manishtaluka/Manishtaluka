name: Generate GitHub Stats Images

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  github-readme-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Stats Card
        uses: anmol098/waka-readme-stats@master
        continue-on-error: true
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Manishtaluka
          COMMIT_BY_ME: "False"

      - name: Create assets directory
        run: mkdir -p assets

      - name: Generate Stats SVG via Python
        run: |
          pip install requests --quiet

          python3 << 'PYEOF'
          import requests, json, os, base64

          token = os.environ.get("GH_TOKEN", "")
          username = "Manishtaluka"
          headers = {"Authorization": f"Bearer {token}"} if token else {}

          # Fetch user stats via GitHub API
          user = requests.get(f"https://api.github.com/users/{username}", headers=headers).json()
          repos = requests.get(f"https://api.github.com/users/{username}/repos?per_page=100&type=owner", headers=headers).json()

          stars = sum(r.get("stargazers_count", 0) for r in repos if isinstance(repos, list))
          forks = sum(r.get("forks_count", 0) for r in repos if isinstance(repos, list))
          followers = user.get("followers", 0)
          public_repos = user.get("public_repos", 0)

          # Language stats
          langs = {}
          if isinstance(repos, list):
              for repo in repos:
                  if not repo.get("fork"):
                      lang = repo.get("language")
                      if lang:
                          langs[lang] = langs.get(lang, 0) + 1

          top_langs = sorted(langs.items(), key=lambda x: x[1], reverse=True)[:6]

          # Color map
          colors = {
              "JavaScript": "#f1e05a", "TypeScript": "#3178c6", "Python": "#3572A5",
              "HTML": "#e34c26", "CSS": "#563d7c", "Java": "#b07219",
              "C++": "#f34b7d", "C": "#555555", "Go": "#00ADD8",
              "Rust": "#dea584", "PHP": "#4F5D95", "Ruby": "#701516",
              "Shell": "#89e051", "Vue": "#41b883", "React": "#61dafb",
          }

          # Stats SVG
          stats_svg = f'''<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#1a1b27"/>
                <stop offset="100%" style="stop-color:#24273a"/>
              </linearGradient>
            </defs>
            <rect width="495" height="195" rx="10" fill="url(#bg)" stroke="#e2e8f020" stroke-width="1"/>
            <text x="25" y="35" font-family="Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#a9b1d6">Manish Taluka's GitHub Stats</text>
            <text x="25" y="70" font-family="Segoe UI,sans-serif" font-size="13" fill="#787c99">⭐ Total Stars Earned:</text>
            <text x="350" y="70" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">{stars}</text>
            <text x="25" y="95" font-family="Segoe UI,sans-serif" font-size="13" fill="#787c99">🍴 Total Forks:</text>
            <text x="350" y="95" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">{forks}</text>
            <text x="25" y="120" font-family="Segoe UI,sans-serif" font-size="13" fill="#787c99">📦 Public Repos:</text>
            <text x="350" y="120" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">{public_repos}</text>
            <text x="25" y="145" font-family="Segoe UI,sans-serif" font-size="13" fill="#787c99">👥 Followers:</text>
            <text x="350" y="145" font-family="Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#e2e8f0">{followers}</text>
            <text x="25" y="175" font-family="Segoe UI,sans-serif" font-size="11" fill="#414868">Generated by GitHub Actions • Updates every 6 hours</text>
          </svg>'''

          with open("assets/stats.svg", "w") as f:
              f.write(stats_svg)

          # Top Languages SVG
          total = sum(v for _, v in top_langs) or 1
          lang_items = ""
          bar_items = ""
          bar_x = 25
          bar_width = 445

          for i, (lang, count) in enumerate(top_langs):
              pct = count / total
              color = colors.get(lang, "#8b949e")
              y = 75 + i * 28
              lang_items += f'''
                <circle cx="25" cy="{y - 4}" r="5" fill="{color}"/>
                <text x="38" y="{y}" font-family="Segoe UI,sans-serif" font-size="12" fill="#a9b1d6">{lang}</text>
                <text x="430" y="{y}" font-family="Segoe UI,sans-serif" font-size="12" fill="#787c99" text-anchor="end">{pct*100:.1f}%</text>
              '''
              seg_w = pct * bar_width
              bar_items += f'<rect x="{bar_x}" y="50" width="{seg_w:.1f}" height="8" fill="{color}" rx="4"/>'
              bar_x += seg_w

          langs_height = 75 + len(top_langs) * 28 + 20
          langs_svg = f'''<svg width="495" height="{langs_height}" viewBox="0 0 495 {langs_height}" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#1a1b27"/>
                <stop offset="100%" style="stop-color:#24273a"/>
              </linearGradient>
            </defs>
            <rect width="495" height="{langs_height}" rx="10" fill="url(#bg2)" stroke="#e2e8f020" stroke-width="1"/>
            <text x="25" y="30" font-family="Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#a9b1d6">Most Used Languages</text>
            {bar_items}
            {lang_items}
          </svg>'''

          with open("assets/top-langs.svg", "w") as f:
              f.write(langs_svg)

          print(f"Stats: stars={stars}, forks={forks}, repos={public_repos}, followers={followers}")
          print(f"Langs: {top_langs}")
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Streak SVG via Python
        run: |
          python3 << 'PYEOF'
          import requests, os
          from datetime import datetime, timedelta

          token = os.environ.get("GH_TOKEN", "")
          username = "Manishtaluka"
          headers = {"Authorization": f"Bearer {token}"} if token else {}

          # Fetch contribution data via GraphQL
          query = """
          query($username: String!) {
            user(login: $username) {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays {
                      contributionCount
                      date
                    }
                  }
                }
              }
            }
          }
          """
          resp = requests.post(
              "https://api.github.com/graphql",
              json={"query": query, "variables": {"username": username}},
              headers=headers
          ).json()

          cal = resp.get("data", {}).get("user", {}).get("contributionsCollection", {}).get("contributionCalendar", {})
          total = cal.get("totalContributions", 0)
          weeks = cal.get("weeks", [])

          # Calculate current streak and longest streak
          days = []
          for week in weeks:
              for day in week.get("contributionDays", []):
                  days.append((day["date"], day["contributionCount"]))

          days.sort()
          current_streak = 0
          longest_streak = 0
          temp = 0
          today = datetime.utcnow().date().isoformat()

          for i in range(len(days) - 1, -1, -1):
              date, count = days[i]
              if date > today:
                  continue
              if count > 0:
                  current_streak += 1
              else:
                  break

          for _, count in days:
              if count > 0:
                  temp += 1
                  longest_streak = max(longest_streak, temp)
              else:
                  temp = 0

          streak_svg = f'''<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#1a1b27"/>
                <stop offset="100%" style="stop-color:#24273a"/>
              </linearGradient>
            </defs>
            <rect width="495" height="195" rx="10" fill="url(#bg3)" stroke="#e2e8f020" stroke-width="1"/>
            <text x="247" y="30" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#a9b1d6" text-anchor="middle">GitHub Contribution Streak</text>

            <text x="82" y="80" font-family="Segoe UI,sans-serif" font-size="11" fill="#787c99" text-anchor="middle">Total Contributions</text>
            <text x="82" y="115" font-family="Segoe UI,sans-serif" font-size="30" font-weight="700" fill="#70a5fd" text-anchor="middle">{total}</text>
            <text x="82" y="138" font-family="Segoe UI,sans-serif" font-size="10" fill="#787c99" text-anchor="middle">All time</text>

            <line x1="165" y1="55" x2="165" y2="155" stroke="#e2e8f015" stroke-width="1"/>

            <text x="247" y="80" font-family="Segoe UI,sans-serif" font-size="11" fill="#787c99" text-anchor="middle">Current Streak</text>
            <text x="247" y="115" font-family="Segoe UI,sans-serif" font-size="30" font-weight="700" fill="#bf91f3" text-anchor="middle">{current_streak}</text>
            <text x="247" y="138" font-family="Segoe UI,sans-serif" font-size="10" fill="#787c99" text-anchor="middle">days</text>

            <line x1="330" y1="55" x2="330" y2="155" stroke="#e2e8f015" stroke-width="1"/>

            <text x="413" y="80" font-family="Segoe UI,sans-serif" font-size="11" fill="#787c99" text-anchor="middle">Longest Streak</text>
            <text x="413" y="115" font-family="Segoe UI,sans-serif" font-size="30" font-weight="700" fill="#38bdae" text-anchor="middle">{longest_streak}</text>
            <text x="413" y="138" font-family="Segoe UI,sans-serif" font-size="10" fill="#787c99" text-anchor="middle">days</text>

            <text x="247" y="178" font-family="Segoe UI,sans-serif" font-size="11" fill="#414868" text-anchor="middle">Generated by GitHub Actions • Updates every 6 hours</text>
          </svg>'''

          with open("assets/streak.svg", "w") as f:
              f.write(streak_svg)

          print(f"Streak: total={total}, current={current_streak}, longest={longest_streak}")
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Trophies SVG
        run: |
          python3 << 'PYEOF'
          import requests, os

          token = os.environ.get("GH_TOKEN", "")
          username = "Manishtaluka"
          headers = {"Authorization": f"Bearer {token}"} if token else {}

          user = requests.get(f"https://api.github.com/users/{username}", headers=headers).json()
          repos = requests.get(f"https://api.github.com/users/{username}/repos?per_page=100&type=owner", headers=headers).json()

          followers = user.get("followers", 0)
          public_repos = user.get("public_repos", 0)
          stars = sum(r.get("stargazers_count", 0) for r in repos if isinstance(repos, list))

          def trophy(x, y, label, value, color):
              return f'''
                <rect x="{x}" y="{y}" width="130" height="80" rx="8" fill="#1a1b27" stroke="{color}" stroke-width="1.5"/>
                <text x="{x+65}" y="{y+22}" font-family="Segoe UI,sans-serif" font-size="22" text-anchor="middle">🏆</text>
                <text x="{x+65}" y="{y+50}" font-family="Segoe UI,sans-serif" font-size="18" font-weight="700" fill="{color}" text-anchor="middle">{value}</text>
                <text x="{x+65}" y="{y+68}" font-family="Segoe UI,sans-serif" font-size="10" fill="#787c99" text-anchor="middle">{label}</text>
              '''

          t1 = trophy(15, 20, "Repositories", public_repos, "#70a5fd")
          t2 = trophy(160, 20, "Stars", stars, "#f7c948")
          t3 = trophy(305, 20, "Followers", followers, "#bf91f3")
          t4 = trophy(450, 20, "Total Repos", public_repos, "#38bdae")

          trophies_svg = f'''<svg width="610" height="120" viewBox="0 0 610 120" xmlns="http://www.w3.org/2000/svg">
            <rect width="610" height="120" rx="10" fill="#16172b" stroke="#e2e8f015" stroke-width="1"/>
            {t1}{t2}{t3}{t4}
          </svg>'''

          with open("assets/trophies.svg", "w") as f:
              f.write(trophies_svg)

          print(f"Trophies: repos={public_repos}, stars={stars}, followers={followers}")
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify SVG files
        run: |
          for f in assets/stats.svg assets/top-langs.svg assets/streak.svg assets/trophies.svg; do
            size=$(wc -c < "$f")
            echo "$f: $size bytes"
            head -1 "$f"
          done

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: update stats images [skip ci]"
          git push origin main
